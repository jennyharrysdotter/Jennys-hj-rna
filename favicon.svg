import { useState, useRef, useEffect, useCallback } from 'react'

const SYSTEM = `Du är Jennys Hjärna – en analytisk mötesassistent. Analysera mötet med fyra tydliga sektioner:

🗒 SAMMANFATTNING
Vad sades och beslutades.

⚙️ SYSTEMANALYS
Vilka strukturer, mönster eller dynamiker driver samtalet?

🔁 MÖNSTER
Vad upprepas? Vad undviks? Vilka teman dyker upp?

💬 UNDERLIGGANDE BUDSKAP
Vad sägs inte men kommuniceras ändå? Det emotionella och politiska substratet.

Svara på svenska. Var konkret och skarp. Varje sektion max 4–5 meningar.`

const s = {
  app: {
    height: '100vh',
    display: 'flex',
    flexDirection: 'column',
    background: 'var(--surface)',
    paddingTop: 'var(--sat)',
    paddingBottom: 'var(--sab)',
  },
  header: {
    padding: '16px 20px 14px',
    borderBottom: '1px solid var(--border)',
    display: 'flex',
    alignItems: 'center',
    justifyContent: 'space-between',
    flexShrink: 0,
  },
  logoWrap: { lineHeight: 1 },
  logoText: { fontSize: 19, fontWeight: 500, letterSpacing: '-0.3px', color: 'var(--ink)' },
  logoItalic: { color: 'var(--gold)', fontStyle: 'italic' },
  subtext: { fontFamily: "'JetBrains Mono', monospace", fontSize: 9, letterSpacing: 2, color: 'var(--ink-faint)', marginTop: 3 },
  pill: (active) => ({
    fontFamily: "'JetBrains Mono', monospace",
    fontSize: 9, letterSpacing: 2,
    padding: '4px 10px', borderRadius: 20,
    border: `1px solid ${active ? 'var(--gold)' : 'var(--border)'}`,
    color: active ? 'var(--gold)' : 'var(--ink-faint)',
    background: active ? 'var(--gold-pale)' : 'transparent',
    transition: 'all .3s',
  }),
  main: { flex: 1, overflow: 'hidden', display: 'flex', flexDirection: 'column' },
}

// ── Setup screen ─────────────────────────────────────────────────────────────
function Setup({ onSave }) {
  const [key, setKey] = useState('')
  const valid = key.startsWith('sk-')
  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '32px 24px', gap: 24 }}>
      <div style={{ textAlign: 'center' }}>
        <div style={{ fontSize: 26, fontWeight: 500 }}>Jennys <span style={{ color: 'var(--gold)', fontStyle: 'italic' }}>Hjärna</span></div>
        <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 9, letterSpacing: 2, color: 'var(--ink-faint)', marginTop: 6 }}>FÖRSTA GÅNGEN – API-NYCKEL</div>
      </div>
      <div style={{ width: '100%', maxWidth: 320, display: 'flex', flexDirection: 'column', gap: 12 }}>
        <p style={{ fontSize: 13, color: 'var(--ink-muted)', lineHeight: 1.7 }}>
          Ange din Anthropic API-nyckel. Den sparas lokalt på din enhet.
        </p>
        <input
          type="password"
          value={key}
          onChange={e => setKey(e.target.value)}
          placeholder="sk-ant-..."
          style={{
            width: '100%', background: 'var(--gold-pale)',
            border: '1px solid var(--border)', borderRadius: 8,
            padding: '13px 14px', color: 'var(--ink)',
            fontFamily: "'JetBrains Mono', monospace", fontSize: 13,
          }}
        />
        <button
          onClick={() => { localStorage.setItem('jh_key', key); onSave(key) }}
          disabled={!valid}
          style={{
            background: valid ? 'var(--gold)' : 'var(--gold-pale)',
            border: 'none', borderRadius: 8, padding: '13px',
            color: valid ? '#fff' : 'var(--ink-faint)',
            fontFamily: "'JetBrains Mono', monospace", fontSize: 10, letterSpacing: 2,
            cursor: valid ? 'pointer' : 'default', transition: 'all .2s',
          }}
        >SPARA &amp; STARTA</button>
        <p style={{ fontSize: 10, color: 'var(--ink-faint)', textAlign: 'center', fontFamily: "'JetBrains Mono', monospace" }}>
          console.anthropic.com → API Keys
        </p>
      </div>
    </div>
  )
}

// ── Idle screen ───────────────────────────────────────────────────────────────
function Idle({ onStart }) {
  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 24 }}>
      <button
        onClick={onStart}
        style={{
          width: 88, height: 88, borderRadius: '50%',
          background: 'var(--gold-pale)',
          border: '1.5px solid var(--gold)',
          cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center',
          transition: 'all .2s', position: 'relative',
        }}
        onTouchStart={e => e.currentTarget.style.transform = 'scale(0.95)'}
        onTouchEnd={e => e.currentTarget.style.transform = 'scale(1)'}
        aria-label="Starta inspelning"
      >
        <svg width="32" height="32" viewBox="0 0 24 24" fill="var(--gold)">
          <path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm-6 10a6 6 0 0 0 12 0h2a8 8 0 0 1-7 7.93V21h2v2H9v-2h2v-2.07A8 8 0 0 1 4 11h2z"/>
        </svg>
      </button>
      <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, letterSpacing: 2, color: 'var(--ink-faint)' }}>
        TRYCK FÖR ATT STARTA MÖTET
      </div>
    </div>
  )
}

// ── Recording screen ──────────────────────────────────────────────────────────
function Recording({ onStop, elapsed, liveText }) {
  const fmt = s => `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`
  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column' }}>
      <div style={{ padding: '16px 20px', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', gap: 14, flexShrink: 0 }}>
        <div style={{ width: 10, height: 10, borderRadius: '50%', background: '#c0392b', animation: 'blink 1s ease-in-out infinite', flexShrink: 0 }} />
        <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 22, fontWeight: 300, letterSpacing: 4, color: 'var(--ink)' }}>
          {fmt(elapsed)}
        </div>
        <button
          onClick={onStop}
          style={{
            marginLeft: 'auto', background: 'var(--ink)', border: 'none',
            color: 'var(--surface)', fontFamily: "'JetBrains Mono', monospace",
            fontSize: 10, letterSpacing: 2, padding: '9px 18px',
            borderRadius: 4, cursor: 'pointer',
          }}
        >STOPPA</button>
      </div>
      <div style={{ flex: 1, overflow: 'auto', padding: '20px', fontSize: 15, lineHeight: 1.9, color: 'var(--ink-muted)' }}>
        {liveText
          ? <>{liveText}<span style={{ color: 'var(--gold)', animation: 'blink .9s infinite' }}>|</span></>
          : <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, letterSpacing: 1, color: 'var(--ink-faint)' }}>
              Lyssnar...<span style={{ animation: 'blink .9s infinite' }}>|</span>
            </span>
        }
      </div>
    </div>
  )
}

// ── Processing screen ─────────────────────────────────────────────────────────
function Processing() {
  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 16 }}>
      <div style={{ width: 36, height: 36, border: '1.5px solid var(--border)', borderTopColor: 'var(--gold)', borderRadius: '50%', animation: 'spin .8s linear infinite' }} />
      <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, letterSpacing: 2, color: 'var(--ink-faint)' }}>ANALYSERAR MÖTET</div>
    </div>
  )
}

// ── Result screen ─────────────────────────────────────────────────────────────
function Result({ analysis, transcript, apiKey }) {
  const [tab, setTab] = useState('analysis')
  const [chatMessages, setChatMessages] = useState([])
  const [chatInput, setChatInput] = useState('')
  const [loading, setLoading] = useState(false)
  const chatEndRef = useRef(null)

  useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }) }, [chatMessages, loading])

  const sendChat = async () => {
    if (!chatInput.trim() || loading) return
    const userMsg = { role: 'user', content: chatInput }
    const newHistory = [...chatMessages, userMsg]
    setChatMessages(newHistory)
    setChatInput('')
    setLoading(true)
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: SYSTEM + '\n\nMötestranskript:\n' + transcript,
          messages: [{ role: 'assistant', content: analysis }, ...newHistory],
        }),
      })
      const data = await res.json()
      const reply = data.content?.find(b => b.type === 'text')?.text || 'Inget svar.'
      setChatMessages(prev => [...prev, { role: 'assistant', content: reply }])
    } catch (e) {
      setChatMessages(prev => [...prev, { role: 'assistant', content: 'Fel: ' + e.message }])
    }
    setLoading(false)
  }

  const Tab = ({ id, label }) => (
    <button
      onClick={() => setTab(id)}
      style={{
        flex: 1, background: 'none', border: 'none',
        borderBottom: `2px solid ${tab === id ? 'var(--gold)' : 'transparent'}`,
        color: tab === id ? 'var(--gold)' : 'var(--ink-faint)',
        fontFamily: "'JetBrains Mono', monospace", fontSize: 10, letterSpacing: 1.5,
        padding: '11px 4px', cursor: 'pointer', transition: 'all .2s', marginBottom: -1,
      }}
    >{label}</button>
  )

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      <div style={{ display: 'flex', borderBottom: '1px solid var(--border)', padding: '0 20px', flexShrink: 0 }}>
        <Tab id="analysis" label="ANALYS" />
        <Tab id="transcript" label="TRANSKRIPT" />
        <Tab id="chat" label="CHATT" />
      </div>

      {tab !== 'chat' && (
        <div style={{ flex: 1, overflow: 'auto', padding: '20px' }}>
          {tab === 'analysis' && (
            <div style={{ fontSize: 14, lineHeight: 1.9, color: 'var(--ink)', whiteSpace: 'pre-wrap', animation: 'fadeUp .4s ease forwards' }}>
              {analysis}
            </div>
          )}
          {tab === 'transcript' && (
            <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 12, lineHeight: 1.9, color: 'var(--ink-muted)', fontWeight: 300 }}>
              {transcript}
            </div>
          )}
        </div>
      )}

      {tab === 'chat' && (
        <>
          <div style={{ flex: 1, overflow: 'auto', padding: '16px 20px', display: 'flex', flexDirection: 'column', gap: 14 }}>
            {chatMessages.length === 0 && (
              <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, letterSpacing: 1, color: 'var(--ink-faint)', textAlign: 'center', paddingTop: 24 }}>
                STÄLL EN FÖLJDFRÅGA OM MÖTET
              </div>
            )}
            {chatMessages.map((m, i) => (
              <div key={i} style={
                m.role === 'user'
                  ? { background: 'var(--gold-pale)', border: '1px solid var(--gold-light)', borderRadius: '10px 10px 2px 10px', padding: '11px 14px', fontSize: 14, lineHeight: 1.7, marginLeft: '14%', animation: 'fadeUp .3s ease forwards' }
                  : { fontSize: 14, lineHeight: 1.9, color: 'var(--ink)', whiteSpace: 'pre-wrap', animation: 'fadeUp .35s ease forwards' }
              }>
                {m.content}
              </div>
            ))}
            {loading && (
              <div style={{ display: 'flex', gap: 5, alignItems: 'center', padding: '4px 0' }}>
                {[0,1,2].map(i => <div key={i} style={{ width: 6, height: 6, borderRadius: '50%', background: 'var(--gold)', animation: `blink 1.2s ease-in-out ${i*.2}s infinite` }} />)}
              </div>
            )}
            <div ref={chatEndRef} />
          </div>
          <div style={{ padding: '10px 16px', borderTop: '1px solid var(--border)', display: 'flex', gap: 10, alignItems: 'flex-end', background: 'var(--surface)', flexShrink: 0 }}>
            <textarea
              value={chatInput}
              onChange={e => setChatInput(e.target.value)}
              onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat() } }}
              placeholder="Fråga om mötet..."
              rows={1}
              style={{
                flex: 1, background: 'var(--gold-pale)', border: '1px solid var(--border)',
                borderRadius: 8, padding: '10px 13px', fontSize: 15,
                color: 'var(--ink)', lineHeight: 1.5, maxHeight: 100, overflow: 'auto',
              }}
              onFocus={e => e.target.style.borderColor = 'var(--gold)'}
              onBlur={e => e.target.style.borderColor = 'var(--border)'}
            />
            <button
              onClick={sendChat}
              disabled={loading || !chatInput.trim()}
              style={{
                width: 36, height: 36, borderRadius: 7, flexShrink: 0,
                background: chatInput.trim() && !loading ? 'var(--gold)' : 'var(--gold-pale)',
                border: '1px solid var(--gold-light)', cursor: chatInput.trim() && !loading ? 'pointer' : 'default',
                color: chatInput.trim() && !loading ? '#fff' : 'var(--ink-faint)',
                fontSize: 16, display: 'flex', alignItems: 'center', justifyContent: 'center',
                transition: 'all .2s',
              }}
            >↑</button>
          </div>
        </>
      )}
    </div>
  )
}

// ── Main app ──────────────────────────────────────────────────────────────────
export default function App() {
  const [apiKey, setApiKey] = useState(() => localStorage.getItem('jh_key') || '')
  const [mode, setMode] = useState('idle') // idle | recording | processing | result
  const [elapsed, setElapsed] = useState(0)
  const [liveText, setLiveText] = useState('')
  const [transcript, setTranscript] = useState('')
  const [analysis, setAnalysis] = useState('')

  const recognitionRef = useRef(null)
  const timerRef = useRef(null)
  const fullRef = useRef('')

  const pillLabel = { idle: 'REDO', recording: 'SPELAR IN', processing: 'ANALYSERAR', result: 'KLART' }

  const startRecording = useCallback(() => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition
    if (!SR) { alert('Mikrofon stöds inte i denna webbläsare. Använd Chrome.'); return }
    fullRef.current = ''
    setLiveText('')
    setElapsed(0)

    const rec = new SR()
    rec.lang = 'auto'
    rec.continuous = true
    rec.interimResults = true
    rec.onresult = e => {
      let fin = '', int = ''
      for (let i = e.resultIndex; i < e.results.length; i++) {
        e.results[i].isFinal ? (fin += e.results[i][0].transcript + ' ') : (int += e.results[i][0].transcript)
      }
      fullRef.current += fin
      setLiveText(fullRef.current + int)
    }
    rec.onerror = e => console.error('Speech error', e.error)
    rec.onend = () => { if (mode === 'recording' || recognitionRef.current === rec) rec.start() }
    rec.start()
    recognitionRef.current = rec

    timerRef.current = setInterval(() => setElapsed(t => t + 1), 1000)
    setMode('recording')
  }, [mode])

  const stopRecording = useCallback(async () => {
    if (recognitionRef.current) {
      recognitionRef.current.onend = null
      recognitionRef.current.stop()
    }
    clearInterval(timerRef.current)
    const text = (fullRef.current + '').trim()
    if (!text) { setMode('idle'); return }

    setTranscript(text)
    setMode('processing')

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1200,
          system: SYSTEM,
          messages: [{ role: 'user', content: 'Transkript:\n\n' + text }],
        }),
      })
      const data = await res.json()
      setAnalysis(data.content?.find(b => b.type === 'text')?.text || 'Kunde inte analysera.')
    } catch (e) {
      setAnalysis('Fel: ' + e.message)
    }
    setMode('result')
  }, [apiKey])

  const reset = () => {
    fullRef.current = ''
    setMode('idle'); setLiveText(''); setTranscript(''); setAnalysis('')
  }

  if (!apiKey) return (
    <div style={s.app}>
      <Setup onSave={setApiKey} />
    </div>
  )

  return (
    <div style={s.app}>
      <div style={s.header}>
        <div style={s.logoWrap}>
          <div style={s.logoText}>Jennys <span style={s.logoItalic}>Hjärna</span></div>
          <div style={s.subtext}>TRANSKRIBERING · ANALYS</div>
        </div>
        <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
          <span style={s.pill(mode === 'recording')}>{pillLabel[mode]}</span>
          {mode === 'result' && (
            <button onClick={reset} style={{ background: 'none', border: '1px solid var(--border)', borderRadius: 4, fontFamily: "'JetBrains Mono', monospace", fontSize: 9, letterSpacing: 1.5, color: 'var(--ink-faint)', padding: '5px 11px', cursor: 'pointer' }}>
              NYTT
            </button>
          )}
          <button onClick={() => { localStorage.removeItem('jh_key'); setApiKey('') }} style={{ background: 'none', border: 'none', color: 'var(--border)', fontSize: 14, cursor: 'pointer', padding: 4 }} title="Byt API-nyckel">⚙</button>
        </div>
      </div>

      <div style={s.main}>
        {mode === 'idle' && <Idle onStart={startRecording} />}
        {mode === 'recording' && <Recording onStop={stopRecording} elapsed={elapsed} liveText={liveText} />}
        {mode === 'processing' && <Processing />}
        {mode === 'result' && <Result analysis={analysis} transcript={transcript} apiKey={apiKey} />}
      </div>
    </div>
  )
}
